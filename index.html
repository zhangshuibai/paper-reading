<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>论文解读 · Paper Reading Notes</title>
<style>
  :root{
    --bg:#0f1220; --panel:#171a2b; --panel2:#1d2138; --text:#e8eaf2;
    --muted:#9aa3bd; --line:#2a2f4a; --accent:#7aa2ff; --accent2:#9b8cff;
    --chip:#232842; --chipText:#c7cdec; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f6f7fb; --panel:#ffffff; --panel2:#f0f2f9; --text:#1a1f33;
      --muted:#5a627a; --line:#e6e9f2; --accent:#3a66ff; --accent2:#6b4cff;
      --chip:#eef1fb; --chipText:#36406b; --shadow:0 8px 24px rgba(20,30,80,.08);
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Helvetica,Arial,sans-serif;
    line-height:1.6;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:40px 20px 80px}
  header.hero{margin-bottom:28px}
  .hero h1{font-size:30px; margin:0 0 6px; letter-spacing:.3px}
  .hero p{color:var(--muted); margin:0; font-size:15px}
  .bar{display:flex; gap:12px; align-items:center; margin:22px 0 18px; flex-wrap:wrap}
  .search{
    flex:1; min-width:220px; background:var(--panel); border:1px solid var(--line);
    color:var(--text); padding:11px 14px; border-radius:12px; font-size:14px; outline:none;
  }
  .search:focus{border-color:var(--accent)}
  .count{color:var(--muted); font-size:13px; white-space:nowrap}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px}
  .card{
    display:block; text-decoration:none; color:inherit; background:var(--panel);
    border:1px solid var(--line); border-radius:16px; padding:18px 18px 16px;
    box-shadow:var(--shadow); transition:transform .12s ease, border-color .12s ease;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--accent)}
  .card h3{margin:0 0 8px; font-size:17px; line-height:1.35}
  .meta{color:var(--muted); font-size:12.5px; margin-bottom:10px}
  .tldr{font-size:13.5px; color:var(--text); opacity:.92; margin:0 0 12px}
  .chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
  .chip{background:var(--chip); color:var(--chipText); font-size:11.5px; padding:3px 9px; border-radius:999px}
  .links{display:flex; gap:14px; font-size:12.5px}
  .links a{color:var(--accent); text-decoration:none}
  .links a:hover{text-decoration:underline}
  .empty{
    text-align:center; color:var(--muted); padding:60px 20px; background:var(--panel);
    border:1px dashed var(--line); border-radius:16px;
  }
  .empty code{background:var(--panel2); padding:2px 7px; border-radius:6px; color:var(--text)}
  footer{margin-top:50px; color:var(--muted); font-size:12.5px; text-align:center}
  footer a{color:var(--accent); text-decoration:none}
  .date-badge{float:right; color:var(--muted); font-weight:normal; font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>📚 论文解读 · Paper Reading Notes</h1>
    <p>个人文献阅读与整理。每篇文章由 <code>paper-reading</code> skill 独立解读、生成自包含 HTML 并发布。</p>
  </header>

  <div class="bar">
    <input id="search" class="search" type="search" placeholder="搜索标题 / 作者 / 标签 / 关键词 …" autocomplete="off">
    <span class="count" id="count"></span>
  </div>

  <div id="grid" class="grid"></div>

  <footer>
    由 <a href="https://github.com/zhangshuibai/paper-reading">zhangshuibai/paper-reading</a> 维护 ·
    数据来源 <code>papers.json</code>
  </footer>
</div>

<script>
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
let PAPERS = [];

function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function card(p){
  const tags = (p.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('');
  const links = [];
  if(p.arxiv) links.push(`<a href="${esc(p.arxiv)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">arXiv / 原文 ↗</a>`);
  if(p.code)  links.push(`<a href="${esc(p.code)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">代码 ↗</a>`);
  const sub = [p.authors, p.team].filter(Boolean).map(esc).join(' · ');
  return `<a class="card" href="${esc(p.path)}">
    <h3>${esc(p.title)}<span class="date-badge">${esc(p.date||'')}</span></h3>
    ${sub?`<div class="meta">${sub}</div>`:''}
    ${p.tldr?`<p class="tldr">${esc(p.tldr)}</p>`:''}
    ${tags?`<div class="chips">${tags}</div>`:''}
    ${links.length?`<div class="links">${links.join('')}</div>`:''}
  </a>`;
}

function render(list){
  if(!list.length){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      还没有解读。<br><br>对我说一篇论文的<b>标题</b>或<b>链接</b>（如 arXiv），并让我运行 <code>paper-reading</code> skill 即可在这里生成一篇解读。
    </div>`;
    return;
  }
  grid.innerHTML = list.map(card).join('');
}

function applyFilter(){
  const q = searchEl.value.trim().toLowerCase();
  const list = !q ? PAPERS : PAPERS.filter(p=>{
    const hay = [p.title,p.authors,p.team,p.tldr,(p.tags||[]).join(' ')].join(' ').toLowerCase();
    return hay.includes(q);
  });
  countEl.textContent = `${list.length} / ${PAPERS.length} 篇`;
  render(list);
}

searchEl.addEventListener('input', applyFilter);

fetch('./papers.json', {cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(data=>{ PAPERS = Array.isArray(data)?data:[]; applyFilter(); })
  .catch(()=>{
    countEl.textContent='';
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      无法读取 <code>papers.json</code>。<br>如果你是在本地用 <code>file://</code> 打开，请改用发布后的在线链接（GitHub Pages 或 raw.githack.com）查看。
    </div>`;
  });
</script>
</body>
</html>
