<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>论文解读 · Paper Reading Notes</title>
<style>
  :root{
    --bg:#0f1220; --panel:#171a2b; --panel2:#1d2138; --text:#e8eaf2;
    --muted:#9aa3bd; --line:#2a2f4a; --accent:#7aa2ff; --accent2:#9b8cff;
    --ok:#43c59e; --chip:#232842; --chipText:#c7cdec; --shadow:0 6px 22px rgba(0,0,0,.30);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f6f7fb; --panel:#ffffff; --panel2:#f0f2f9; --text:#1a1f33;
      --muted:#5a627a; --line:#e6e9f2; --accent:#3a66ff; --accent2:#6b4cff;
      --ok:#138a6e; --chip:#eef1fb; --chipText:#36406b; --shadow:0 6px 18px rgba(20,30,80,.07);
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Helvetica,Arial,sans-serif;
    line-height:1.6;
  }
  .wrap{max-width:1120px; margin:0 auto; padding:40px 20px 80px}
  header.hero{margin-bottom:24px}
  .hero h1{font-size:30px; margin:0 0 6px; letter-spacing:.3px}
  .hero p{color:var(--muted); margin:0; font-size:15px}
  .bar{display:flex; gap:12px; align-items:center; margin:22px 0 14px; flex-wrap:wrap}
  .search{
    flex:1; min-width:220px; background:var(--panel); border:1px solid var(--line);
    color:var(--text); padding:11px 14px; border-radius:12px; font-size:14px; outline:none;
  }
  .search:focus{border-color:var(--accent)}
  .count{color:var(--muted); font-size:13px; white-space:nowrap}
  .catbar{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 22px}
  .catbtn{cursor:pointer; border:1px solid var(--line); background:var(--panel); color:var(--text);
          padding:7px 15px; border-radius:999px; font-size:13.5px; transition:all .12s ease}
  .catbtn:hover{border-color:var(--accent)}
  .catbtn.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  .catbtn .n{opacity:.65; margin-left:6px; font-size:12px}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px; align-items:stretch}
  .card{
    display:flex; flex-direction:column; background:var(--panel);
    border:1px solid var(--line); border-radius:16px; padding:16px 18px;
    box-shadow:var(--shadow); cursor:pointer; transition:transform .12s ease, border-color .12s ease;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--accent)}
  .card-top{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px}
  .cats{display:flex; gap:6px; flex-wrap:wrap}
  .cat{font-size:11px; font-weight:700; padding:2px 9px; border-radius:6px; letter-spacing:.2px; white-space:nowrap}
  .cat.c-agent{background:rgba(122,162,255,.18); color:var(--accent)}
  .cat.c-se{background:rgba(155,140,255,.20); color:var(--accent2)}
  .cat.c-wm{background:rgba(67,197,158,.20); color:var(--ok)}
  .cat.c-mcp{background:rgba(240,150,60,.22); color:#cf7a1f}
  .date{color:var(--muted); font-size:12px; white-space:nowrap; flex-shrink:0}
  .card h3{margin:0 0 8px; font-size:16.5px; line-height:1.4}
  .card h3 a{color:inherit; text-decoration:none}
  .card h3 a:hover{color:var(--accent)}
  .meta{color:var(--muted); font-size:12.5px; margin:0 0 10px;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .tldr{font-size:13.5px; color:var(--text); opacity:.92; margin:0 0 12px;
        display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden}
  .chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px}
  .chip{background:var(--chip); color:var(--chipText); font-size:11.5px; padding:3px 9px; border-radius:999px}
  .links{margin-top:auto; display:flex; gap:14px; font-size:12.5px}
  .links a{color:var(--accent); text-decoration:none}
  .links a:hover{text-decoration:underline}
  .empty{
    text-align:center; color:var(--muted); padding:60px 20px; background:var(--panel);
    border:1px dashed var(--line); border-radius:16px;
  }
  .empty code{background:var(--panel2); padding:2px 7px; border-radius:6px; color:var(--text)}
  footer{margin-top:50px; color:var(--muted); font-size:12.5px; text-align:center}
  footer a{color:var(--accent); text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>📚 论文解读 · Paper Reading Notes</h1>
    <p>个人文献阅读与整理。每篇文章由 <code>paper-reading</code> skill 独立解读、生成自包含 HTML 并发布。</p>
  </header>

  <div class="bar">
    <input id="search" class="search" type="search" placeholder="搜索标题 / 作者 / 标签 / 关键词 …" autocomplete="off">
    <span class="count" id="count"></span>
  </div>

  <div id="catbar" class="catbar"></div>
  <div id="grid" class="grid"></div>

  <footer>
    由 <a href="https://github.com/zhangshuibai/paper-reading">zhangshuibai/paper-reading</a> 维护 ·
    数据来源 <code>papers.json</code>
  </footer>
</div>

<script>
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const catbar = document.getElementById('catbar');
let PAPERS = [];
let activeCat = 'all';

const CATS = {
  'agent':         {label:'Agent',         cls:'c-agent'},
  'self-evolving': {label:'Self-Evolving', cls:'c-se'},
  'world-model':   {label:'World Model',   cls:'c-wm'},
  'mcp':           {label:'MCP',           cls:'c-mcp'},
};
const CAT_ORDER = ['agent','self-evolving','world-model','mcp'];

function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function catBadges(p){
  return (p.categories||[]).filter(c=>CATS[c]).map(c=>`<span class="cat ${CATS[c].cls}">${CATS[c].label}</span>`).join('');
}

// NOTE: card is a <div> (not <a>) so the inner 原文/代码 <a> links are not nested anchors.
function card(p){
  const tags = (p.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('');
  const links = [];
  if(p.arxiv) links.push(`<a href="${esc(p.arxiv)}" target="_blank" rel="noopener">原文 ↗</a>`);
  if(p.code)  links.push(`<a href="${esc(p.code)}" target="_blank" rel="noopener">代码 ↗</a>`);
  const sub = [p.authors, p.team].filter(Boolean).map(esc).join(' · ');
  const badges = catBadges(p);
  return `<div class="card" data-href="${esc(p.path)}" role="link" tabindex="0">
    <div class="card-top">
      <div class="cats">${badges}</div>
      <span class="date">${esc(p.date||'')}</span>
    </div>
    <h3><a href="${esc(p.path)}">${esc(p.title)}</a></h3>
    ${sub?`<div class="meta">${sub}</div>`:''}
    ${p.tldr?`<p class="tldr">${esc(p.tldr)}</p>`:''}
    ${tags?`<div class="chips">${tags}</div>`:''}
    ${links.length?`<div class="links">${links.join('')}</div>`:''}
  </div>`;
}

function renderCatbar(){
  const counts = {all: PAPERS.length};
  CAT_ORDER.forEach(c => counts[c] = PAPERS.filter(p=>(p.categories||[]).includes(c)).length);
  const items = ['all', ...CAT_ORDER];
  catbar.innerHTML = items.map(c=>{
    const label = c==='all' ? '全部' : CATS[c].label;
    return `<button class="catbtn ${c===activeCat?'active':''}" data-cat="${c}">${label}<span class="n">${counts[c]||0}</span></button>`;
  }).join('');
  catbar.querySelectorAll('.catbtn').forEach(b=>{
    b.onclick = ()=>{ activeCat = b.dataset.cat; renderCatbar(); applyFilter(); };
  });
}

function render(list){
  grid.innerHTML = list.length
    ? list.map(card).join('')
    : `<div class="empty" style="grid-column:1/-1">没有匹配的解读。</div>`;
}

function applyFilter(){
  const q = searchEl.value.trim().toLowerCase();
  let list = PAPERS;
  if(activeCat !== 'all') list = list.filter(p=>(p.categories||[]).includes(activeCat));
  if(q) list = list.filter(p=>{
    const hay = [p.title,p.authors,p.team,p.tldr,(p.tags||[]).join(' '),(p.categories||[]).join(' ')].join(' ').toLowerCase();
    return hay.includes(q);
  });
  countEl.textContent = `${list.length} / ${PAPERS.length} 篇`;
  render(list);
}

// whole-card click navigation (but let real links inside behave normally)
grid.addEventListener('click', e=>{
  if(e.target.closest('a')) return;
  const c = e.target.closest('.card');
  if(c && c.dataset.href) location.href = c.dataset.href;
});

searchEl.addEventListener('input', applyFilter);

fetch('./papers.json', {cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(data=>{ PAPERS = Array.isArray(data)?data:[]; renderCatbar(); applyFilter(); })
  .catch(()=>{
    countEl.textContent='';
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      无法读取 <code>papers.json</code>。<br>如果在本地用 <code>file://</code> 打开，请改用发布后的在线链接（GitHub Pages）查看。
    </div>`;
  });
</script>
</body>
</html>
