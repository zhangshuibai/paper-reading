name: Deploy site to GitHub Pages

# Publishes the repo root (landing page + papers/<slug>/ notes) to GitHub Pages.
# Uses the "GitHub Actions" Pages source and auto-enables Pages on first run,
# so no manual Settings click is required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
